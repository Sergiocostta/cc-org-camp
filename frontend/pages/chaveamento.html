<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaveamento e Resultados - CC-ORG-CAMP</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        .chaveamento-container {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            align-items: center;
            justify-content: center;
        }
        .fase-torneio {
            flex: 1;
            max-width: 400px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .fase-torneio h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .card-jogo {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .linha-time {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            font-size: 14pt;
        }
        .entrada-placar {
            width: 60px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        .divisor-vs {
            text-align: center;
            font-weight: bold;
            color: #888;
            margin: 10px 0;
        }
        .botao-salvar-placar {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .botao-salvar-placar:hover {
            background-color: #1d4ed8;
        }
        .botao-salvar-placar:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        /* Banner de Campeão integrado na mesma tela */
        .banner-campeao {
            background: linear-gradient(135deg, #fef08a 0%, #facc15 100%);
            border: 2px solid #eab308;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(234, 179, 8, 0.2);
        }
        .banner-campeao h2 {
            margin: 0 0 5px 0;
            color: #854d0e;
        }
    </style>
</head>
<body>

    <header class="cabecalho-topo">
        <div class="logo-sistema">
            <h2>CC-ORG-CAMP</h2>
        </div>
        <nav class="navegacao-usuario">
            <a href="home.html" class="botao-cancelar">Voltar ao Painel</a>
        </nav>
    </header>

    <main class="conteudo-painel" style="padding: 20px;">
        
        <section id="secao-resultado-final" class="banner-campeao" style="display: none;">
            <h2>🏆 GRANDE CAMPEÃO 🏆</h2>
            <h1 id="nome-do-campeao" style="color: #0f172a; margin: 5px 0 0 0;">Nome do Time</h1>
        </section>

        <section class="barra-acoes" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 class="titulo-secao" style="margin: 0;">Chaveamento do Torneio</h1>
            <button id="btn-encerrar-torneio" class="botao-salvar" style="display: none; background-color: #10b981; margin: 0;">Encerrar Campeonato</button>
        </section>

        <div class="container-chaveamento">
            
            <div class="fase-torneio">
                <h3>Semifinais</h3>
                
                <div class="card-jogo">
                    <form id="form-jogo-1">
                        <input type="hidden" name="partida_id" value="1">
                        <div class="linha-time">
                            <span>Time A</span>
                            <input type="number" name="placar_time_a" min="0" class="entrada-placar" required>
                        </div>
                        <div class="divisor-vs">VS</div>
                        <div class="linha-time">
                            <span>Time B</span>
                            <input type="number" name="placar_time_b" min="0" class="entrada-placar" required>
                        </div>
                        <button type="submit" class="botao-salvar-placar">Salvar Placar</button>
                    </form>
                </div>

                <div class="card-jogo">
                    <form id="form-jogo-2">
                        <input type="hidden" name="partida_id" value="2">
                        <div class="linha-time">
                            <span>Time C</span>
                            <input type="number" name="placar_time_c" min="0" class="entrada-placar" required>
                        </div>
                        <div class="divisor-vs">VS</div>
                        <div class="linha-time">
                            <span>Time D</span>
                            <input type="number" name="placar_time_d" min="0" class="entrada-placar" required>
                        </div>
                        <button type="submit" class="botao-salvar-placar">Salvar Placar</button>
                    </form>
                </div>
            </div>

            <div class="fase-torneio">
                <h3>Grande Final</h3>
                
                <div class="card-jogo">
                    <form id="form-jogo-final">
                        <input type="hidden" name="partida_id" value="3">
                        <div class="linha-time">
                            <span id="vencedor-j1" style="color: #888; font-style: italic;">Vencedor Jogo 1</span>
                            <input type="number" name="placar_final_a" min="0" class="entrada-placar" disabled required>
                        </div>
                        <div class="divisor-vs">VS</div>
                        <div class="linha-time">
                            <span id="vencedor-j2" style="color: #888; font-style: italic;">Vencedor Jogo 2</span>
                            <input type="number" name="placar_final_b" min="0" class="entrada-placar" disabled required>
                        </div>
                        <button type="submit" id="btn-salvar-final" class="botao-salvar-placar" disabled>Definir Campeão</button>
                    </form>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
