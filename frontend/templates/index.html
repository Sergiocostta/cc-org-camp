<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CC-ORG-CAMP</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
    
<body>

   <main class="login-container">

    <section class="login-card">

        <header class="cabecalho-login">
            <H1 class="titulo-login">cc-org-camp</H1>
            <p class="subtitulo-login">Gerencie seus campeonatos em um só lugar </p>
        </header>
    
        <form id="formulario-login" class="formulario-login">

            <div class="grupo-campo">
                <label for="email" class="legenda-campo">Email </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="entrada-campo"
                    placeholder="Digite seu email" 
                    required
                >
            </div>

            <div class="grupo-campo">
                <label for="senha" class="legenda-campo">Senha</label>
                <input 
                    type="password"
                    id="senha"
                    name="senha"
                    class="entrada-campo"
                    placeholder="Digite sua senha"
                    required
                >
            </div>

            <button type="submit" class="botao-entrar">Entrar</button>
        </form>

        <footer class="rodape-login">
            <p>Não tem uma conta? <a href="/cadastro" class="link-cadastro">Cadastre-se aqui</a></p>
        </footer>


    </section>
   </main>
   <script src="{{ url_for('static', filename='js/script.js') }}"></script>
   <script src="{{ url_for('static', filename='js/tema.js') }}"></script>
    
</body>
</html>
