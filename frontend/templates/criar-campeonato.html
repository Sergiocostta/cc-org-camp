<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Campeonato - CC-ORG-CAMP</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
</head>
<body>
    <header class="cabecalho-topo">
        <div class="logo-sistema"><h2>CC-ORG-CAMP</h2></div>
        <nav class="navegacao-usuario">
            <a href="/home" class="botao-sair">← Voltar</a>
        </nav>
    </header>

    <main class="conteudo-painel">
        <section style="max-width:520px; margin:0 auto;">
            <header style="margin-bottom:28px;">
                <h1 class="titulo-secao">Criar Novo Campeonato</h1>
                <p style="color:var(--clr-text-muted); font-size:14px; margin-top:6px;">Preencha os dados abaixo para começar a organização.</p>
            </header>

            <div id="msg-erro"    class="mensagem-erro"    style="display:none; margin-bottom:16px;"></div>
            <div id="msg-sucesso" class="mensagem-sucesso"  style="display:none; margin-bottom:16px;"></div>

            <form id="formulario-criacao" style="display:flex; flex-direction:column; gap:20px;">
                <div class="grupo-campo">
                    <label for="tipo-evento" class="legenda-campo">Tipo de Evento</label>
                    <select id="tipo-evento" class="entrada-campo" required>
                        <option value="" disabled selected>Selecione o tipo</option>
                        <option value="esporte">Esporte Coletivo (Futebol, Vôlei, etc.)</option>
                        <option value="luta">Artes Marciais / Lutas (Jiu-Jitsu, Boxe, etc.)</option>
                    </select>
                </div>
                <div class="grupo-campo">
                    <label for="nome-campeonato" class="legenda-campo">Nome do Torneio</label>
                    <input type="text" id="nome-campeonato" class="entrada-campo" 
                    placeholder="Ex: Copa Marcão 2026" required>
                </div>
                <div class="grupo-campo">
                    <label for="modalidade" class="legenda-campo">Modalidade Específica</label>
                    <input type="text" id="modalidade" class="entrada-campo" 
                    placeholder="Ex: Futebol de Campo, Jiu-Jitsu" required>
                </div>
                <div class="grupo-campo">
                    <label for="categoria" class="legenda-campo">Categoria / Faixa / Peso</label>
                    <input type="text" id="categoria" class="entrada-campo" 
                    placeholder="Ex: Faixa azul até 80kg sub20">
                </div>
                <div class="grupo-campo">
                    <label for="qtd-competidores" class="legenda-campo">Quantidade de Competidores</label>
                    <input type="number" id="qtd-competidores" class="entrada-campo" min="2" 
                    placeholder="Ex: 8, 16, 32..." required>
                </div>
                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button type="submit" id="btn-criar" class="botao-entrar" style="flex:1">Criar Campeonato</button>
                    <a href="/home" class="botao-sair" style="display:flex; align-items:center;">Cancelar</a>
                </div>
            </form>
        </section>
    </main>

<script src="{{ url_for('static', filename='js/criar-campeonato.js') }}"></script>
<script src="{{ url_for('static', filename='js/tema.js') }}"></script>
</body>
</html>
