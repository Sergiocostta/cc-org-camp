<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Principal - CC-ORG-CAMP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <header class="cabecalho-topo">
        <div class="logo-sistema"><h2>CC-ORG-CAMP</h2></div>
        <nav class="navegacao-usuario">
            <span>Olá, <span id="nome-usuario-logado">{{ usuario }}</span></span>
            <a href="/logout" class="botao-sair">Sair</a>
        </nav>
    </header>

    <main class="conteudo-painel">
        <section class="barra-acoes">
            <h1 class="titulo-secao">Seus Campeonatos</h1>
            <a href="/criar-campeonato" class="botao-criar-campeonato">+ Criar novo campeonato</a>
        </section>

        <div id="mensagem-erro" class="mensagem-erro" style="display:none; margin-bottom:16px;"></div>

        <div class="divisor-listas">
            <section class="bloco-campeonatos">
                <h2 class="campeonato-andamento">Em andamento</h2>
                <div id="lista-em-andamento" class="grade-campeonatos">
                    <div class="estado-vazio">Carregando...</div>
                </div>
            </section>
            <section class="bloco-campeonatos">
                <h2 class="campeonato-concluido">Concluídos</h2>
                <div id="lista-concluidos" class="grade-campeonatos">
                    <div class="estado-vazio">Carregando...</div>
                </div>
            </section>
        </div>
    </main>

<script src="{{ url_for('static', filename='js/home.js') }}"></script>
<script src="{{ url_for('static', filename='js/tema.js') }}"></script>
</body>
</html>
