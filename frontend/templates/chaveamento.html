<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaveamento e Resultados - CC-ORG-CAMP</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
</head>
<body>

    <header class="cabecalho-topo">
        <div class="logo-sistema">
            <h2>CC-ORG-CAMP</h2>
        </div>
        <nav class="navegacao-usuario">
            <a href="/home" class="botao-cancelar">Voltar ao Painel</a>
        </nav>
    </header>
    
    <main class="conteudo-painel" style="padding: 20px;">
        
        <section id="secao-resultado-final" class="banner-campeao" style="display: none;">
            <h2>GRANDE CAMPEÃO</h2>
            <h1 id="nome-do-campeao"></h1>
        </section>

        <section class="barra-acoes" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="titulo" class="titulo-secao" style="margin: 0;"></h1>
            <button id="btn-encerrar-torneio" class="botao-salvar" style="display: none;">Encerrar Campeonato</button>
        </section>

        <div class="chaveamento-container"></div>

    </main>
<script src="{{ url_for('static', filename='js/chaveamento.js') }}"></script>
<script src="{{ url_for('static', filename='js/tema.js') }}"></script>
</body>
</html>
