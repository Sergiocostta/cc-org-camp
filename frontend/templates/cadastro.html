<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CC-ORG-CAMP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <main class="cadastro-container">
        <section class="cadastro-card">
            <header class="cabecalho-login">
                <H1 class="titulo-login">cc-org-camp</H1>
                <p class="subtitulo-login">Crie sua conta para começar</p>
            </header>

            <form id="formulario-cadastro" class="formulario-cadastro">
                <div id="mensagem-erro" class="mensagem-erro" style="display:none; margin-bottom:16px;"></div>
                <div id="mensagem-sucesso" class="mensagem-sucesso" style="display:none; margin-bottom:16px;"></div>

                <div class="grupo-campo">
                    <label for="novo-usuario" class="legenda-campo">Escolha um usuario</label>
                    <input type="text" id="nome" name="novo-usuario" class="entrada-campo" placeholder="Ex: marcos123"
                        required>
                </div>

                <div class="grupo-campo">
                    <label for="email" class="legenda-campo">E-Mail</label>
                    <input type="email" id="email" name="email" class="entrada-campo" placeholder="Digite seu e-mail"
                        required>
                </div>

                <div class="grupo-campo">
                    <label for="nova-senha" class="legenda-campo">Crie uma senha</label>
                    <input type="password" id="senha" name="nova-senha" class="entrada-campo"
                        placeholder="Digite sua senha" required>

                    <div id="forca-senha" class="forca-senha-container" style="display:none; margin-top: 8px;">
                        <div class="barra-forca"
                            style="height: 4px; background: #ddd; border-radius: 2px; overflow: hidden;">
                            <div id="progresso-forca"
                                style="height: 100%; width: 0; transition: width 0.3s, background-color 0.3s;"></div>
                        </div>
                        <small id="texto-forca"
                            style="font-size: 12px; margin-top: 4px; display: block; color: var(--clr-text-muted);"></small>
                    </div>
                </div>

                <button type="submit" class="botao-entrar">Cadastrar</button>
            </form>

            <footer class="rodape-login">
                <p>Já tem uma conta? <a href="/" class="link-login">Voltar para Login</a></p>
            </footer>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/cadastro.js') }}"></script>
</body>

</html>
