<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserir Competidores - CC-ORG-CAMP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <style>
        .lista-inserir-dinamica { display:flex; flex-direction:column; gap:10px; }
        .linha-competidor { display:flex; align-items:center; gap:10px; }
        .num-competidor { font-family:var(--font-mono); font-size:12px; color:var(--clr-text-muted); min-width:24px; text-align:right; }
        .btn-remover { width:32px; height:32px; border:0.5px solid var(--clr-border-hover); border-radius:var(--radius-sm); background:transparent; color:var(--clr-text-muted); font-size:18px; cursor:pointer; flex-shrink:0; transition:border-color var(--dur-fast), color var(--dur-fast); }
        .btn-remover:hover { border-color:var(--clr-danger); color:var(--clr-danger); }
        .btn-adicionar { margin-top:4px; padding:9px; border:0.5px dashed var(--clr-border-hover); border-radius:var(--radius-sm); background:transparent; color:var(--clr-text-muted); font-family:var(--font-ui); font-size:13px; cursor:pointer; width:100%; transition:border-color var(--dur-fast), color var(--dur-fast); }
        .btn-adicionar:hover { border-color:var(--clr-text-secondary); color:var(--clr-text-primary); }
        .sorteio-resultado { margin-top:24px; padding:20px; border:0.5px solid var(--clr-border); border-radius:var(--radius-md); background:var(--clr-bg-surface); }
        .sorteio-lista { display:flex; flex-direction:column; gap:6px; list-style:none; }
        .sorteio-item { display:flex; align-items:center; gap:12px; font-size:14px; padding:8px 12px; border-radius:var(--radius-sm); background:var(--clr-bg-base); }
        .sorteio-seed { font-family:var(--font-mono); font-size:11px; color:var(--clr-text-muted); min-width:20px; }
    </style>

</head>

<body>
    <header class="cabecalho-topo">
        <div class="logo-sistema"><h2>CC-ORG-CAMP</h2></div>
        <nav class="navegacao-usuario">
            <a href="/home" class="botao-sair">← Voltar</a>
        </nav>
    </header>

    <main class="conteudo-painel">
        <section style="max-width:560px; margin:0 auto;">
            <header style="margin-bottom:28px;">
                <h1 id="titulo-torneio"></h1>
                <h1 class="titulo-secao">Inscrição de Competidores</h1>
                <p style="color:var(--clr-text-muted); font-size:14px; margin-top:6px;">Insira os nomes. O sorteio das chaves é automático.</p>
            </header>

            <div id="msg-erro" class="mensagem-erro" style="display:none; margin-bottom:16px;"></div>
            <div id="msg-sucesso" class="mensagem-sucesso" style="display:none; margin-bottom:16px;"></div>

            <form id="formulario-competidores">
                <ul id="lista-competidores">
                </ul>
                <div id="inserir-competidores-container" class="lista-inserir-dinamica"></div>
                <button type="button" class="btn-adicionar" onclick="addCompetidores()">+ Adicionar competidor</button>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button type="submit" id="btn-sortear" class="botao-entrar" style="flex:1">Sortear Chaves e Salvar</button>
                    <a href="/home" class="botao-sair" style="display:flex; align-items:center;">Cancelar</a>
                </div>
            </form>

            <div id="sorteio-resultado" class="sorteio-resultado" style="display:none;">
                <p style="font-size:11px; font-weight:500; letter-spacing:1.2px; text-transform:uppercase; color:var(--clr-text-muted); margin-bottom:14px;">Ordem das chaves após sorteio</p>
                <ol id="sorteio-lista" class="sorteio-lista"></ol>
                <div style="margin-top:16px;">
                    <a href="/home" class="botao-entrar" style="display:inline-block; text-decoration:none; padding:10px 20px;">Ver todos os campeonatos</a>
                </div>
            </div>
        </section>
    </main>
    
<script src="{{ url_for('static', filename='js/add-competidores.js') }}"></script>
<script src="{{ url_for('static', filename='js/tema.js') }}"></script>
</body>
</html>
